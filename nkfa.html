<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NKFA | Nandini Kumar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="nkfa">
    <header class="site-header">
      <nav class="nav container" aria-label="Primary navigation">
        <a class="brand" href="index.html">
          <span class="brand-title">NKFA</span>
          <span class="brand-subtitle">Nandini Kumar Fashion Agency</span>
        </a>
        <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <div class="nav-links">
          <a href="about.html">About</a>
          <a href="artistiquetale.html">ArtistiqueTale</a>
          <a href="nkfa.html" class="active">NKFA</a>
          <a href="index.html#services">Services</a>
          <a href="index.html#contact">Contact</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section page-detail-intro">
        <div class="container panel-shell page-detail-shell">
          <div class="content-block page-detail-copy">
            <p class="eyebrow dark">NKFA</p>
            <h1>Empowering the next generation of fashion storytellers.</h1>
            <div class="page-description" data-text-file="NKFA.txt"></div>
          </div>
        </div>
      </section>

      <section class="section gallery-section page-gallery-section">
        <div class="container panel-shell page-gallery-shell">
          <div class="gallery-shell" tabindex="0" aria-label="NKFA gallery">
            <div class="gallery" data-media-key="nkfa"></div>
          </div>
        </div>
      </section>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lightbox-frame">
        <button class="lightbox-close" type="button" aria-label="Close lightbox">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>
        <div class="lightbox-controls">
          <button type="button" class="lightbox-prev" aria-label="Previous image">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
          </button>
          <button type="button" class="lightbox-next" aria-label="Next image">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" /></svg>
          </button>
        </div>
        <img id="lightbox-image" src="" alt="" />
      </div>
    </div>

    <script src="script.js"></script>
